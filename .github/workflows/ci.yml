name: CI
on:
  push:
    branches:
      - '**'
      - '!integrated/**'
      - '!stl-preview-head/**'
      - '!stl-preview-base/**'
      - '!generated'
      - '!codegen/**'
      - 'codegen/stl/**'
  pull_request:
    branches-ignore:
      - 'stl-preview-head/**'
      - 'stl-preview-base/**'

jobs:
  lint:
    timeout-minutes: 10
    name: lint
    runs-on: ${{ github.repository == 'stainless-sdks/nimbleway-typescript' && 'depot-ubuntu-24.04' || 'ubuntu-latest' }}
    if: (github.event_name == 'push' || github.event.pull_request.head.repo.fork) && (github.event_name != 'push' || github.event.head_commit.message != 'codegen metadata')
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.30.1'

      - name: Bootstrap
        run: ./scripts/bootstrap

      - name: Check types
        run: ./scripts/lint

  build:
    timeout-minutes: 5
    name: build
    runs-on: ${{ github.repository == 'stainless-sdks/nimbleway-typescript' && 'depot-ubuntu-24.04' || 'ubuntu-latest' }}
    if: (github.event_name == 'push' || github.event.pull_request.head.repo.fork) && (github.event_name != 'push' || github.event.head_commit.message != 'codegen metadata')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.30.1'

      - name: Bootstrap
        run: ./scripts/bootstrap

      - name: Check build
        run: ./scripts/build

      - name: Get GitHub OIDC Token
        if: |-
          github.repository == 'stainless-sdks/nimbleway-typescript' &&
          !startsWith(github.ref, 'refs/heads/stl/')
        id: github-oidc
        uses: actions/github-script@v8
        with:
          script: core.setOutput('github_token', await core.getIDToken());

      - name: Upload tarball
        if: |-
          github.repository == 'stainless-sdks/nimbleway-typescript' &&
          !startsWith(github.ref, 'refs/heads/stl/')
        env:
          URL: https://pkg.stainless.com/s
          AUTH: ${{ steps.github-oidc.outputs.github_token }}
          SHA: ${{ github.sha }}
        run: ./scripts/utils/upload-artifact.sh

      - name: Upload MCP Server tarball
        if: |-
          github.repository == 'stainless-sdks/nimbleway-typescript' &&
          !startsWith(github.ref, 'refs/heads/stl/')
        env:
          URL: https://pkg.stainless.com/s?subpackage=mcp-server
          AUTH: ${{ steps.github-oidc.outputs.github_token }}
          SHA: ${{ github.sha }}
          BASE_PATH: packages/mcp-server
        run: ./scripts/utils/upload-artifact.sh
  test:
    timeout-minutes: 10
    name: test
    runs-on: ${{ github.repository == 'stainless-sdks/nimbleway-typescript' && 'depot-ubuntu-24.04' || 'ubuntu-latest' }}
    if: github.event_name == 'push' || github.event.pull_request.head.repo.fork
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.30.1'

      - name: Bootstrap
        run: ./scripts/bootstrap

      - name: Build
        run: ./scripts/build

      - name: Run tests
        run: ./scripts/test

  contract-tests:
    timeout-minutes: 10
    name: contract tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.fork
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.30.1'

      - name: Bootstrap
        run: ./scripts/bootstrap

      - name: Build SDK
        run: ./scripts/build

      - name: Run contract tests
        id: tests
        working-directory: contract-tests
        run: |
          npm test 2>&1 | tee /tmp/test-output.txt
          # Strip ANSI codes before parsing
          sed -i 's/\x1b\[[0-9;]*m//g' /tmp/test-output.txt
          PASSED=$(sed -n 's/.*Tests[[:space:]]\+\([0-9]\+\) passed.*/\1/p' /tmp/test-output.txt | tail -1)
          TOTAL=$(sed -n 's/.*Tests[[:space:]]\+[0-9]\+ passed (\([0-9]\+\)).*/\1/p' /tmp/test-output.txt | tail -1)
          FILES=$(sed -n 's/.*Test Files[[:space:]]\+\([0-9]\+\) passed.*/\1/p' /tmp/test-output.txt | tail -1)
          PASSED=${PASSED:-0}; TOTAL=${TOTAL:-0}; FILES=${FILES:-0}
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Post coverage comment
        working-directory: contract-tests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER=${{ github.event.pull_request.number }}
          else
            PR_NUMBER=$(gh pr view "${{ github.ref_name }}" --repo ${{ github.repository }} --json number -q .number 2>/dev/null || true)
          fi
          [ -z "$PR_NUMBER" ] && echo "No open PR found, skipping comment" && exit 0

          COVERAGE_TABLE=$(node scripts/coverage-summary.mjs --markdown 2>/dev/null)
          OPENAPI_TABLE=$(node scripts/openapi-coverage.mjs --markdown 2>/dev/null)
          BODY=$(cat <<EOF
          ## SDK Contract Tests Coverage

          **${{ steps.tests.outputs.passed }}/${{ steps.tests.outputs.total }}** tests passed across **${{ steps.tests.outputs.files }}** test files

          ### Code Coverage (v8, source-mapped)

          ${COVERAGE_TABLE}

          > Coverage is measured on the published SDK artifact via \`pnpm pack\`. Resource files at 100% means every public method is exercised by contract tests.

          <details>
          <summary><strong>OpenAPI Endpoint Coverage</strong></summary>

          ${OPENAPI_TABLE}

          </details>
          EOF
          )
          COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${PR_NUMBER}/comments \
            --jq '.[] | select(.body | startswith("## SDK Contract Tests Coverage")) | .id' | head -1)
          if [ -n "$COMMENT_ID" ]; then
            gh api repos/${{ github.repository }}/issues/comments/$COMMENT_ID -X PATCH -f body="$BODY"
          else
            gh pr comment "$PR_NUMBER" --body "$BODY"
          fi
