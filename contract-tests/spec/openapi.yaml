info:
  description: The AI-Native SDK for Real-Time Web Data at scale
  title: Nimble SDK
  version: 3.2.0
openapi: 3.1.0
components:
  schemas:
    AgentAsyncPayload:
      description: Request body model for the /agent/run endpoint
      properties:
        agent:
          description: The agent's name to execute
          examples:
            - google_search
          type: string
        formats:
          description: Output formats to include in the response alongside `data.parsing`. By default, only structured parsed
            data is returned.
          items:
            enum:
              - html
              - markdown
              - headers
              - links
            type: string
          type: array
        localization:
          description: Controls if localization sould be enabled (default false). Some agent support localization based on
            zip_code or store_id on the site it self. Relevant only when agent is supporting localization
          type: boolean
        params:
          allOf:
            - $ref: '#/components/schemas/AgentParams'
            - $ref: '#/components/schemas/AsyncOptions'
          description: The agent's input parameters, for example query, prodcut_id, etc. Depands on the agent used.
          examples:
            - params:
                keyword: iphone 17
                zip_code: '90210'
          required: []
          type: object
      required:
        - agent
        - params
      title: AgentPayload
      type: object
    AgentBatchBody:
      description: Request body for executing a batch of agent requests
      properties:
        inputs:
          items:
            $ref: '#/components/schemas/AgentBatchInputsPayload'
            required: []
          type: array
        shared_inputs:
          allOf:
            - $ref: '#/components/schemas/AgentAsyncPayload'
              required:
                - Agents
      required:
        - inputs
        - shared_inputs
      type: object
    AgentBatchInputsPayload:
      description: Request body model for the /agent/run endpoint
      properties:
        formats:
          description: Output formats to include in the response alongside `data.parsing`. By default, only structured parsed
            data is returned.
          items:
            enum:
              - html
              - markdown
              - headers
              - links
            type: string
          type: array
        localization:
          description: Controls if localization sould be enabled (default false). Some agent support localization based on
            zip_code or store_id on the site it self. Relevant only when agent is supporting localization
          type: boolean
        params:
          allOf:
            - $ref: '#/components/schemas/AgentParams'
          description: The agent's input parameters, for example query, prodcut_id, etc. Depands on the agent used.
          examples:
            - params:
                keyword: iphone 17
                zip_code: '90210'
          required: []
          type: object
      required:
        - agent
        - params
      title: AgentBatchInputsPayload
      type: object
    AgentGenerationResponse:
      properties:
        agent_name:
          description: The name of the agent
          title: Agent Name
          type: string
        error:
          anyOf:
            - description: The error of the agent generation
              title: Error
              type: string
            - type: 'null'
          description: The error of the agent generation
          title: Error
        id:
          description: The id of the agent generation
          format: uuid
          title: Id
          type: string
        status:
          description: The status of the agent generation
          title: Status
          type: string
        summary:
          anyOf:
            - type: string
            - type: 'null'
          description: The summary of the agent generation
          title: Summary
        version_id:
          description: The version id of the agent
          format: uuid
          title: Version Id
          type: string
      required:
        - id
        - status
      title: AgentGenerationResponse
      type: object
    AgentParams:
      additionalProperties: true
      description: Agent input parameters. At least one agent-specific key-value pair is required (e.g., `keyword`, `product_id`).
        Refer to the specific agent's documentation.
      minProperties: 1
      properties:
        country:
          description: Country used to access the target URL, use ISO Alpha-2 Codes
          examples:
            - US
          type: string
        locale:
          description: Language preference for the search results. Use LCID standard
          examples:
            - en
          type: string
        parse:
          description: Whether to parse the response content
          examples:
            - true
          type: boolean
        tag:
          description: User-defined tag for request identification
          examples:
            - campaign-2024-q1
          type: string
      type: object
    AgentPayload:
      description: Request body model for the /agent/run endpoint
      properties:
        agent:
          description: The agent's name to execute
          examples:
            - google_search
          type: string
        formats:
          description: Output formats to include in the response alongside `data.parsing`. By default, only structured parsed
            data is returned.
          items:
            enum:
              - html
              - markdown
              - headers
              - links
            type: string
          type: array
        localization:
          description: Controls if localization sould be enabled (default false). Some agent support localization based on
            zip_code or store_id on the site it self. Relevant only when agent is supporting localization
          type: boolean
        params:
          allOf:
            - $ref: '#/components/schemas/AgentParams'
          description: The agent's input parameters, for example query, prodcut_id, etc. Depands on the agent used.
          examples:
            - params:
                keyword: iphone 17
                zip_code: '90210'
          required: []
          type: object
      required:
        - agent
        - params
      title: AgentPayload
      type: object
    AgentResponse:
      properties:
        data:
          description: Data from the extraction
          properties:
            browser_actions:
              description: Browser actions results
              items:
                type: object
              type: array
            cookies:
              description: Cookies when cookie capture is enabled
              type: object
            fetch_request:
              description: Captured executed fetch requests when enabled
              items:
                type: object
              type: array
            headers:
              description: Response headers from the target website
              type: object
            html:
              description: Raw HTML content of the page
              type: string
            markdown:
              description: Markdown content when markdown conversion is enabled
              type: string
            network_capture:
              description: Captured network activity when enabled
              items:
                type: object
              type: array
            parsing:
              description: Parsed data when parsing is enabled
              type: object
            screenshot:
              description: Base64 encoded screenshot when enabled (requires rendering)
              type: string
          type: object
        metadata:
          description: Metadata from the extraction
          properties:
            agent:
              description: Agent name used for extraction
              examples:
                - amazon_pdp
              type: string
            driver:
              description: Driver used for extraction (depends on target domain and rendering configuration)
              examples:
                - vx8
              type: string
            input_url:
              description: The original input URL
              format: uri
              type: string
            query_time:
              description: Timestamp when the query was executed
              format: date-time
              type: string
          type: object
        status:
          description: Status of the extraction
          enum:
            - success
            - failed
          type: string
        status_code:
          description: HTTP status code from the target website
          type: integer
        task_id:
          description: Unique identifier for the extraction task
          format: uuid
          type: string
        url:
          description: The URL that was extracted
          format: uri
          type: string
        warnings:
          description: List of warnings
          items:
            type: string
          type: array
      required:
        - url
        - task_id
        - status
        - status_code
        - data
        - metadata
      type: object
    AgentVersionMetadata:
      description: The metadata of the agent version
      properties:
        data_source:
          description: The data source of the agent
          examples:
            - Amazon
          title: Data Source
          type: string
        description:
          anyOf:
            - description: The description of the agent
              examples:
                - The Amazon Product Detail Page Agent extracts structured data from individual product pages on Amazon. This
                  agent is ideal for tracking competitor pricing, monitoring catalog changes, and powering product intelligence
                  use cases.
              title: Description
              type: string
            - type: 'null'
          description: The description of the agent
          title: Description
        domain:
          anyOf:
            - description: The domain of the agent
              examples:
                - www.amazon.com
                - www.google.com
              title: Domain
              type: string
            - type: 'null'
          description: The domain of the agent
          title: Domain
        entity_type:
          anyOf:
            - description: The entity type of the agent
              examples:
                - Product Detail Page (PDP)
                - Search Engine Results Page (SERP)
              title: Entity Type
              type: string
            - type: 'null'
        tags:
          description: The tags of the agent
          examples:
            - - Ecommerce
              - Search
          items:
            type: string
          title: Tags
          type: array
        vertical:
          anyOf:
            - description: The category of the agent
              examples:
                - Ecommerce
                - Search
              title: Category
              type: string
            - type: 'null'
      required: []
      title: AgentVersionMetadata
      type: object
    AsyncOptions:
      properties:
        callback_url:
          description: A URL to callback once the data is delivered. The API will send a POST request with task details (without
            the requested data) when the task completes.
          examples:
            - https://your.callback.url/path
          format: uri
          type: string
        storage_compress:
          description: When set to true, the response saved to storage_url will be compressed using GZIP format. If false
            or not set, response will be saved uncompressed.
          examples:
            - false
          type: boolean
        storage_object_name:
          description: Custom name for the stored object instead of the default task ID
          examples:
            - my task
          type: string
        storage_type:
          description: Storage type for async results. Use s3 for Amazon S3 and gs for Google Cloud Platform.
          enum:
            - s3
            - gs
          examples:
            - s3
          type: string
        storage_url:
          description: 'Repository URL where output will be saved. Format: s3://Your.Bucket.Name/your/object/name/prefix/
            - Output will be saved as TASK_ID.json'
          examples:
            - s3://Your.Repository.Path/
          type: string
      type: object
    AsyncResponse:
      examples:
        - status: success
          task:
            account_name: my-account
            api_type: extract
            created_at: '2026-01-24T12:36:24.685Z'
            id: 8e8cfde8-345b-42b8-b3e2-0c61eb11e00f
            input: {}
            modified_at: '2026-01-24T12:36:24.685Z'
            state: pending
      properties:
        status:
          examples:
            - success
          type: string
        task:
          properties:
            account_name:
              description: The user account name
              examples:
                - my-account
              type: string
            api_type:
              description: The api endpoint used
              enum:
                - agent
                - extract
              examples:
                - extract
              type: string
            created_at:
              description: Task creation timestamp
              examples:
                - '2026-01-24T12:36:24.685Z'
              format: date-time
              type: string
            id:
              description: Unique task identifier
              examples:
                - 8e8cfde8-345b-42b8-b3e2-0c61eb11e00f
              format: uuid
              type: string
            input:
              description: Original request input parameters
              type: object
            modified_at:
              description: Task last modification timestamp
              examples:
                - '2026-01-24T12:36:24.685Z'
              format: date-time
              type: string
            state:
              description: Current state of the task
              enum:
                - pending
                - processing
                - completed
                - failed
              examples:
                - pending
              type: string
          required:
            - id
            - state
            - created_at
            - modified_at
            - input
          type: object
      required:
        - status
        - task
      type: object
    BatchGetResponse:
      additionalProperties: false
      description: Response containing batch details with all tasks.
      properties:
        completed:
          description: Whether all tasks in the batch have finished.
          type: boolean
        completed_at:
          description: ISO timestamp when the batch completed.
          type: string
        completed_count:
          description: Number of tasks that have completed so far.
          type: number
        created_at:
          description: ISO timestamp when the batch was created.
          type: string
        id:
          description: Unique identifier for the batch.
          type: string
        progress:
          description: Completion ratio between 0 and 1.
          type: number
        status:
          const: success
          type: string
        tasks:
          description: List of tasks in the batch.
          items:
            anyOf:
              - additionalProperties: false
                properties:
                  _query: {}
                  account_name:
                    description: Account name that owns the task.
                    type: string
                  api_type:
                    enum:
                      - web
                      - serp
                      - ecommerce
                      - social
                      - media
                      - agent
                      - extract
                    type: string
                  batch_id:
                    description: Batch ID if this task is part of a batch.
                    examples:
                      - 4b0a90bf-c951-42e4-95b3-a95a65ba69fc
                    type: string
                  created_at:
                    description: Timestamp when the task was created.
                    examples:
                      - '2024-01-15T10:30:00Z'
                    type: string
                  download_url:
                    description: URL for downloading the task results.
                    examples:
                      - https://sdk.nimbleway.com/api/v2/tasks/123e4567-e89b-12d3-a456-426614174000/results
                    format: uri
                    type: string
                  error:
                    description: Error message if the task failed.
                    examples:
                      - Connection timeout
                    type: string
                  error_type:
                    description: Classification of the error type.
                    examples:
                      - timeout_error
                    type: string
                  id:
                    description: Unique task identifier.
                    examples:
                      - 123e4567-e89b-12d3-a456-426614174000
                    minLength: 1
                    type: string
                  input:
                    description: Original input data for the task.
                  modified_at:
                    description: Timestamp when the task was last modified.
                    examples:
                      - '2024-01-15T10:35:00Z'
                    type: string
                  output_url:
                    description: Storage location of the output data.
                    type: string
                  state:
                    description: Current state of the task.
                    enum:
                      - pending
                      - success
                      - error
                    examples:
                      - pending
                    type: string
                  status_code:
                    description: HTTP status code from the task execution.
                    examples:
                      - 200
                    type: number
                  status_url:
                    description: URL for checking the task status.
                    examples:
                      - https://sdk.nimbleway.com/api/v2/tasks/123e4567-e89b-12d3-a456-426614174000
                    format: uri
                    type: string
                required:
                  - id
                  - state
                  - status_url
                  - created_at
                  - input
                  - _query
                type: object
              - type: 'null'
          type: array
      required:
        - status
        - id
        - completed
        - completed_count
        - progress
        - created_at
        - tasks
      type: object
    BatchListResponse:
      additionalProperties: false
      description: List of batches.
      properties:
        data:
          description: List of batches.
          items:
            properties:
              account_name:
                description: Name of the account that owns the batch.
                type: string
              completed:
                description: Whether all tasks in the batch have finished.
                type: boolean
              created_at:
                description: ISO timestamp when the batch was created.
                type: string
              id:
                description: Unique identifier for the batch.
                type: string
              tasks:
                items:
                  description: Unique identifier for the task.
                  type: string
                type: array
            required:
              - id
              - account_name
              - completed
              - created_at
              - tasks
            type: object
          type: array
        pagination:
          properties:
            has_next:
              description: Whether there are more batches available.
              type: boolean
            next_cursor:
              description: Cursor to use for fetching the next page.
              type: string
            total:
              description: Total number of batches.
              type: number
          required:
            - has_next
            - next_cursor
            - total
          type: object
      required:
        - data
        - pagination
      type: object
    BatchProgressResponse:
      additionalProperties: false
      description: Lightweight batch progress without task details.
      properties:
        completed:
          description: Whether all tasks in the batch have finished.
          type: boolean
        completed_at:
          description: ISO timestamp when the batch completed.
          type: string
        completed_count:
          description: Number of tasks that have completed so far.
          type: number
        id:
          description: Unique identifier for the batch.
          type: string
        progress:
          description: Completion ratio between 0 and 1.
          type: number
        status:
          const: success
          type: string
      required:
        - status
        - id
        - completed
        - completed_count
        - progress
      type: object
    BatchResponse:
      additionalProperties: false
      description: Response when a batch of extract tasks is created successfully.
      properties:
        batch_id:
          description: Unique identifier for the batch.
          type: string
        batch_size:
          description: Number of tasks in the batch.
          type: number
        tasks:
          description: List of created tasks.
          items:
            additionalProperties: false
            properties:
              _query: {}
              account_name:
                description: Account name that owns the task.
                type: string
              api_type:
                enum:
                  - web
                  - serp
                  - ecommerce
                  - social
                  - media
                  - agent
                  - extract
                type: string
              batch_id:
                description: Batch ID if this task is part of a batch.
                examples:
                  - 4b0a90bf-c951-42e4-95b3-a95a65ba69fc
                type: string
              created_at:
                description: Timestamp when the task was created.
                examples:
                  - '2024-01-15T10:30:00Z'
                type: string
              download_url:
                description: URL for downloading the task results.
                examples:
                  - https://sdk.nimbleway.com/v1/tasks/123e4567-e89b-12d3-a456-426614174000/results
                format: uri
                type: string
              error:
                description: Error message if the task failed.
                examples:
                  - Connection timeout
                type: string
              error_type:
                description: Classification of the error type.
                examples:
                  - timeout_error
                type: string
              id:
                description: Unique task identifier.
                examples:
                  - 123e4567-e89b-12d3-a456-426614174000
                minLength: 1
                type: string
              input:
                description: Original input data for the task.
              modified_at:
                description: Timestamp when the task was last modified.
                examples:
                  - '2024-01-15T10:35:00Z'
                type: string
              output_url:
                description: Storage location of the output data.
                type: string
              state:
                description: Current state of the task.
                enum:
                  - pending
                  - success
                  - error
                examples:
                  - pending
                type: string
              status_code:
                description: HTTP status code from the task execution.
                examples:
                  - 200
                type: number
              status_url:
                description: URL for checking the task status.
                examples:
                  - https://sdk.nimbleway.com/v1/tasks/123e4567-e89b-12d3-a456-426614174000
                format: uri
                type: string
            required:
              - id
              - state
              - status_url
              - created_at
              - input
              - _query
            type: object
          type: array
      type: object
    BrowserAction:
      description: 'An action to perform in the browser (one of: goto, wait, wait_for_element, click, press, fill, scroll,
        auto_scroll, screenshot, get_cookies, fetch)'
      properties:
        auto_scroll:
          description: Automatically scroll to load dynamic content
          oneOf:
            - type: boolean
            - description: Max duration in milliseconds
              type: number
            - properties:
                click_selector:
                  description: CSS selector to click before scrolling
                  type: string
                container:
                  description: CSS selector of container
                  type: string
                delay_after_scroll:
                  type: number
                idle_timeout:
                  type: number
                max_duration:
                  type: number
                pause_on_selector:
                  type: string
                required:
                  type: boolean
                step_size:
                  description: Pixels to scroll per step
                  type: number
              type: object
        click:
          description: Click an element or coordinates
          oneOf:
            - description: CSS selector
              type: string
            - description: Click by selector or coordinates
              properties:
                count:
                  type: number
                delay:
                  type: string
                relative_to:
                  type: string
                required:
                  type: boolean
                scroll:
                  type: boolean
                selector:
                  type: string
                timeout:
                  type: string
                visible:
                  type: boolean
                x:
                  type: number
                y:
                  type: number
              type: object
        fetch:
          description: Make HTTP request from browser context
          oneOf:
            - format: uri
              type: string
            - properties:
                body:
                  description: Request body
                  type: string
                headers:
                  additionalProperties:
                    type: string
                  type: object
                method:
                  enum:
                    - GET
                    - POST
                    - PUT
                    - DELETE
                    - PATCH
                  type: string
                timeout:
                  type: number
                url:
                  format: uri
                  type: string
              required:
                - url
              type: object
        fill:
          description: Fill an input field with text
          properties:
            click_on_element:
              type: boolean
            delay:
              type: number
            mode:
              enum:
                - type
                - paste
              type: string
            required:
              type: boolean
            scroll:
              type: boolean
            selector:
              description: CSS selector of input element
              type: string
            timeout:
              type: number
            typing_interval:
              maximum: 1000
              minimum: 10
              type: number
            value:
              description: Text to fill
              type: string
            visible:
              type: boolean
          required:
            - selector
            - value
          type: object
        get_cookies:
          description: Retrieve cookies
          oneOf:
            - type: boolean
            - properties:
                domain:
                  description: Domain filter for cookies
                  type: string
              type: object
        goto:
          description: Navigate to a URL
          oneOf:
            - format: uri
              type: string
            - properties:
                referer:
                  type: string
                timeout:
                  type: number
                url:
                  format: uri
                  type: string
                wait_until:
                  enum:
                    - load
                    - domcontentloaded
                    - networkidle
                    - commit
                  type: string
              required:
                - url
              type: object
        press:
          description: Press a keyboard key
          oneOf:
            - examples:
                - Enter
              type: string
            - properties:
                delay:
                  type: number
                key:
                  examples:
                    - Enter
                  type: string
              required:
                - key
              type: object
        screenshot:
          description: Capture a screenshot
          oneOf:
            - type: boolean
            - properties:
                format:
                  enum:
                    - png
                    - jpeg
                    - webp
                  type: string
                full_page:
                  type: boolean
                quality:
                  maximum: 100
                  minimum: 0
                  type: number
              type: object
        scroll:
          description: Scroll the page
          oneOf:
            - description: Pixels to scroll (positive = down, negative = up)
              type: number
            - description: Scroll to bottom or CSS selector
              type: string
            - properties:
                container:
                  description: CSS selector of container
                  type: string
                required:
                  type: boolean
                to:
                  description: CSS selector to scroll to
                  type: string
                visible:
                  type: boolean
                x:
                  type: number
                y:
                  type: number
              type: object
        wait:
          description: Pause for a duration
          oneOf:
            - examples:
                - 2s
              type: string
            - properties:
                duration:
                  examples:
                    - 2s
                  type: string
                required:
                  type: boolean
              required:
                - duration
              type: object
        wait_for_element:
          description: Wait for element(s) to appear
          oneOf:
            - description: CSS selector
              type: string
            - description: Array of CSS selectors
              items:
                type: string
              type: array
            - properties:
                selector:
                  oneOf:
                    - type: string
                    - items:
                        type: string
                      type: array
                timeout:
                  type: number
                visible:
                  type: boolean
              required:
                - selector
              type: object
      type: object
    CrawlPayload:
      properties:
        allow_external_links:
          description: Allows the crawler to follow links to external websites
          examples:
            - false
          type: boolean
        allow_subdomains:
          description: Allows the crawler to follow links to subdomains of the main domain
          examples:
            - false
          type: boolean
        callback:
          anyOf:
            - properties:
                events:
                  description: 'Type of events that should be sent to the webhook URL. (default: all)'
                  items:
                    enum:
                      - completed
                      - page
                      - failed
                      - started
                    type: string
                  type: array
                headers:
                  description: Headers to send to the webhook URL
                  type: object
                metadata:
                  description: Custom metadata that will be included in all webhook payloads for this crawl
                  type: object
                url:
                  description: Webhook URL to receive crawl results
                  examples:
                    - https://example.com/webhook
                  format: uri
                  type: string
              required:
                - url
              type: object
            - format: uri
              type: string
          description: Webhook configuration for receiving crawl results
        crawl_entire_domain:
          description: Allows the crawler to follow internal links to sibling or parent URLs, not just child paths
          examples:
            - false
          type: boolean
        exclude_paths:
          description: URL pathname regex patterns that exclude matching URLs from the crawl
          examples:
            - - /exclude-this-path
              - /and-this-path
          items:
            type: string
          type: array
        extract_options:
