            post_processor:
              $ref: '#/components/schemas/PostProcessor'
            type:
              enum:
                - raw
              type: string
          required:
            - type
          type: object
    ParserSelector:
      oneOf:
        - description: CSS selector
          properties:
            css_selector:
              description: CSS selector string
              type: string
            type:
              enum:
                - css
              type: string
          required:
            - type
            - css_selector
          type: object
        - description: XPath selector
          properties:
            path:
              description: XPath expression
              type: string
            type:
              enum:
                - xpath
              type: string
          required:
            - type
            - path
          type: object
        - description: JSON selector
          properties:
            coercion_filter:
              description: JSONPath filter for multiple objects
              type: string
            path:
              description: JSONPath expression
              type: string
            type:
              enum:
                - json
              type: string
          required:
            - type
            - path
          type: object
        - description: Sequence of selectors
          properties:
            sequence:
              items:
                $ref: '#/components/schemas/ParserSelector'
              type: array
            type:
              enum:
                - sequence
              type: string
          required:
            - type
            - sequence
          type: object
        - description: Root selector
          properties:
            type:
              enum:
                - root
              type: string
          required:
            - type
          type: object
    PostProcessor:
      description: Transform extracted data
      properties:
        type:
          enum:
            - number
            - string
            - date
            - regex
            - trim
            - lowercase
            - uppercase
          type: string
      required:
        - type
      type: object
    SearchPayload:
      description: Request body model for the /search endpoint
      properties:
        content_type:
          anyOf:
            - items:
                type: string
              maxItems: 50
              nullable: true
              type: array
          description: Filter by content type (only supported with focus=general). Supports semantic groups ('documents',
            'spreadsheets', 'presentations') and specific formats ('pdf', 'docx', 'xlsx', etc.)
        country:
          default: US
          description: Country code for geo-targeted results (e.g., 'US', 'GB', 'IL')
          examples:
            - US
          type: string
        end_date:
          anyOf:
            - type: string
            - type: 'null'
          description: 'Filter results before this date (format: YYYY-MM-DD or YYYY)'
          title: End Date
        exclude_domains:
          anyOf:
            - items:
                type: string
              maxItems: 50
              nullable: true
              type: array
          description: List of domains to exclude from search results. Maximum 50 domains
          title: Exclude Domains
        focus:
          oneOf:
            - description: Search focus mode (e.g., '`general`', '`news`', '`shopping`')
              enum:
                - general
                - news
                - location
                - coding
                - geo
                - shopping
                - social
                - academic
              title: Search Focus
              type: string
            - description: List of explicit subagent names (e.g., ['`amazon_serp`', '`target_serp`'])
              items:
                type: string
              maxItems: 10
              type: array
        include_answer:
          default: false
          description: Generate an LLM-powered answer summary based on search result snippets
          title: Include Answer
          type: boolean
        include_domains:
          anyOf:
            - items:
                type: string
              maxItems: 50
              nullable: true
              type: array
          description: List of domains to include in search results. Maximum 50 domains
          title: Include Domains
        locale:
          default: en
          description: Language/locale code (e.g., 'en', 'fr', 'de')
          examples:
            - en-US
          type: string
        max_results:
          default: 3
          description: Maximum number of results to return. Actual count may be lower depending on availability
          maximum: 100
          minimum: 1
          title: Num Results
          type: integer
        max_subagents:
          default: 3
          description: Maximum number of subagents to execute in parallel for WSA focus modes (shopping, social, geo). Ignored
            for SERP focus modes
          maximum: 10
          minimum: 1
          title: Max Subagents
          type: integer
        output_format:
          default: markdown
          description: 'Output format: plain_text, markdown, or simplified_html'
          enum:
            - plain_text
            - markdown
            - simplified_html
          title: ParsingType
          type: string
        query:
          description: Search query string
          minLength: 1
          title: Query
          type: string
        search_depth:
          default: lite
          description: Controls content richness and latency. `lite` = metadata only (title, snippet, URL), `fast` = rich
            content (~2K chars), `deep` = full page scraping
          enum:
            - lite
            - fast
            - deep
          title: Search Depth
          type: string
        start_date:
          anyOf:
            - nullable: true
              type: string
          description: 'Filter results after this date (format: YYYY-MM-DD or YYYY)'
          title: Start Date
        time_range:
          description: 'Filter by recency: hour, day, week, month, or year. Cannot be combined with start_date/end_date'
          enum:
            - hour
            - day
            - week
            - month
            - year
          title: TimeRange
          type: string
      required:
        - query
      title: SearchPayload
      type: object
    SearchResponse:
      description: Search API response containing search results with titles, descriptions, URLs, and content
      examples:
        - answer: The top web scraping tools in 2024 include...
          request_id: 123e4567-e89b-12d3-a456-426614174000
          results:
            - content: Full parsed content from the page...
              description: Comprehensive guide to the best web scraping tools...
              metadata:
                published_date: '2024-01-15'
              title: Top 10 Web Scraping Tools for 2024
              url: https://example.com/article1
            - content: Full parsed content from the page...
              description: Compare features, pricing, and performance...
              metadata: {}
              title: Web Scraping Tools Comparison
              url: https://example2.com/comparison
          total_results: 10
      properties:
        answer:
          anyOf:
            - nullable: true
              type: string
          description: AI-generated summary answer to your search query (only available when include_answer parameter is enabled).
            Returns null if disabled or if generation fails.
          examples:
            - The best web scraping tools in 2024 include...
          title: Answer
        request_id:
          description: Unique identifier for tracking this search request
          examples:
            - 123e4567-e89b-12d3-a456-426614174000
          title: Request Id
          type: string
        results:
          description: Array of search results, each containing title, description, URL, content (in Deep Search mode), and
            optional metadata
          items:
            description: Individual search result containing page information. Each result includes title, description, URL,
              extracted content (in Deep Search mode), and optional additional metadata in extra_fields.
            properties:
              content:
                description: Full extracted page content. Populated only when search_depth='deep'
                examples:
                  - Full parsed content from the page...
                title: Content
                type: string
              description:
                description: Meta description or snippet preview from the search result
                examples:
                  - Comprehensive guide to the best web scraping tools...
                title: Description
                type: string
              extra_fields:
                anyOf:
                  - nullable: true
                    type: object
                description: Additional metadata extracted from the page (e.g., published date, author, tags). Content varies
                  by page structure and availability.
                examples:
                  - published_date: '2024-01-15'
                title: Extra Fields
              title:
                description: Page title from the search result
                examples:
                  - Top 10 Web Scraping Tools for 2024
                title: Title
                type: string
              url:
                description: Full URL of the search result page
                examples:
                  - https://example.com/article1
                title: Url
                type: string
            required:
              - title
              - description
              - url
              - content
              - metadata
            title: SearchResultModel
            type: object
          title: Results
          type: array
        total_results:
          description: Total number of search results returned in this response
          examples:
            - 10
          title: Total Results
          type: integer
      required:
        - total_results
        - results
        - request_id
      title: SearchResponse
      type: object
    SerpBatchPayload:
      properties:
        inputs:
          items:
            anyOf:
              - $ref: '#/components/schemas/SerpPayload'
          type: array
        shared_inputs:
          allOf:
            - $ref: '#/components/schemas/AsyncOptions'
            - $ref: '#/components/schemas/SerpPayload'
              required: []
      type: object
    SerpPayload:
      description: Request body model for the fast serp endpoint
      properties:
        ads_optimization:
          default: false
          description: When set to true, boosts sponsored results using incognito rendering (requires JS).
          examples:
            - true
          type: boolean
        coordinates:
          examples:
            - latitude: '40.7123695'
              longitude: '-74.0357317'
          properties:
            latitude:
              description: Google Maps place identifier. Required for google_maps_place and google_maps_reviews
              examples:
                - '40.7123695'
              type: string
            longitude:
              examples:
                - '-74.0357317'
              type: string
          type: object
        country:
          default: US
          description: Run the search as if from a specific country. Returns geo-localized results (optimized for US)
          examples:
            - US
          type: string
        device:
          description: Emulate a specific device type.
          enum:
            - mobile
          examples:
            - mobile
          type: string
        include_pages_html:
          default: false
          description: When set to true, returns raw HTML per individual result page instead of a single stitched HTML string.
          examples:
            - true
          type: boolean
        locale:
          description: Language preference for the search results. Use LCID standard
          examples:
            - en
          type: string
        location:
          description: Location context for the search. Accepted for google_search, google_news, and google_images — not supported
            for Maps engines. Pass a location string (e.g. "United States", "New York, NY") or a raw Google UULE value.
          examples:
            - United States
            - New York, NY
          type: string
        no_html:
          default: false
          description: When set to true, removes the html_content field from the response
          examples:
            - true
          type: boolean
        num_results:
          description: Number of results to return (1–100).
          examples:
            - 10
          maximum: 100
          minimum: 1
          type: integer
        place_id:
          description: Google Maps place identifier. Required for google_maps_place and google_maps_reviews
          examples:
            - ChIJtRq8oUjLw4kR_tN2GQKUOXs
          type: string
        query:
          description: The search query string. Required for google_search, google_news, google_images, and google_maps_search
          examples:
            - NBA Allstars 2026
          type: string
        search_engine:
          description: The search engine to query
          enum:
            - google_search
            - google_aio
            - google_maps_search
            - google_maps_reviews
            - google_maps_place
            - google_news
            - google_images
            - bing_search
            - yandex_search
          examples:
            - google_search
          type: string
        start:
          description: Result offset for fetching beyond the first batch.
          examples:
            - 10
          type: integer
        time:
          description: Filter results by time range. Only supported for google_search, google_news, and google_images
          examples:
            - hour
            - day
            - week
            - month
            - year
          type: string
      required:
        - search_engine
      title: SerpPayload
      type: object
    TaskListResponse:
      additionalProperties: false
      description: Paginated list of tasks response.
      properties:
        data:
          description: Array of task objects.
          items:
            additionalProperties: false
            properties:
              _query: {}
              account_name:
                description: Account name that owns the task.
                type: string
              api_type:
                enum:
                  - web
                  - serp
                  - ecommerce
                  - social
                  - media
                  - agent
                  - extract
                type: string
              batch_id:
                description: Batch ID if this task is part of a batch.
                examples:
                  - 4b0a90bf-c951-42e4-95b3-a95a65ba69fc
                type: string
              created_at:
                description: Timestamp when the task was created.
                examples:
                  - '2024-01-15T10:30:00Z'
                type: string
              download_url:
                description: URL for downloading the task results.
                examples:
                  - https://sdk.nimbleway.com/api/v2/tasks/123e4567-e89b-12d3-a456-426614174000/results
                format: uri
                type: string
              error:
                description: Error message if the task failed.
                examples:
                  - Connection timeout
                type: string
              error_type:
                description: Classification of the error type.
                examples:
                  - timeout_error
                type: string
              id:
                description: Unique task identifier.
                examples:
                  - 123e4567-e89b-12d3-a456-426614174000
                minLength: 1
                type: string
              input:
                description: Original input data for the task.
              modified_at:
                description: Timestamp when the task was last modified.
                examples:
                  - '2024-01-15T10:35:00Z'
                type: string
              output_url:
                description: Storage location of the output data.
                type: string
              state:
                description: Current state of the task.
                enum:
                  - pending
                  - success
                  - error
                examples:
                  - pending
                type: string
              status_code:
                description: HTTP status code from the task execution.
                examples:
                  - 200
                type: number
              status_url:
                description: URL for checking the task status.
                examples:
                  - https://sdk.nimbleway.com/api/v2/tasks/123e4567-e89b-12d3-a456-426614174000
                format: uri
                type: string
            required:
              - id
              - state
              - status_url
              - created_at
              - input
              - _query
            type: object
          type: array
        pagination:
          additionalProperties: false
          properties:
            has_next:
              description: Whether there are more tasks available.
              type: boolean
            next_cursor:
              anyOf:
                - type: string
                - type: 'null'
              description: Cursor to use for fetching the next page.
            total:
              description: Total number of tasks.
              type: number
          required:
            - has_next
            - next_cursor
            - total
          type: object
      required:
        - data
        - pagination
      type: object
  securitySchemes:
    BearerAuth:
      scheme: bearer
      type: http
servers:
  - url: https://sdk.nimbleway.com
paths:
  /v1/agents:
    get:
      parameters:
        - description: Filter by privacy level
          in: query
          name: privacy
          required: false
          schema:
            default: all
            description: Filter by privacy level
            enum:
              - public
              - private
              - all
            type: string
        - description: Filter by who manage the agent
          in: query
          name: managed_by
          required: false
          schema:
            description: Filter by who manage the agent
            enum:
              - nimble
              - community
              - self_managed
            type: string
        - description: Number of results per page
          in: query
          name: limit
          required: false
          schema:
            default: 100
            description: Number of results per page
            maximum: 250
            minimum: 1
            title: Limit
            type: integer
        - description: Pagination offset
          in: query
          name: offset
          required: false
          schema:
            default: 0
            description: Pagination offset
            minimum: 0
            title: Offset
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                  - items:
                      properties:
                        description:
                          anyOf:
                            - type: string
                            - type: 'null'
                          title: Description
                        display_name:
                          title: Display Name
                          type: string
                        domain:
                          anyOf:
                            - type: string
                            - type: 'null'
                          title: Domain
                        entity_type:
                          anyOf:
                            - type: string
                            - type: 'null'
                          title: Entity Type
                        is_public:
                          title: Is Public
                          type: boolean
                        managed_by:
                          title: Managed By
                          type: string
                        name:
                          title: Name
                          type: string
                        vertical:
                          anyOf:
                            - type: string
                            - type: 'null'
                          title: Vertical
                      required:
                        - name
                        - is_public
                        - display_name
                      title: Agents
                      type: object
                    title: Response List Agents
                    type: array
                examples:
                  - - description: The Aldi Browse Products agent extracts structured product listings from Aldi’s category
                        pages. This agent is ideal for monitoring category-level assortment, analyzing competitive inventory,
                        and powering product discovery and pricing intelligence use cases
                      display_name: Aldi Category Landing Page
                      domain: www.aldi.us
                      entity_type: Category Landing Page (CLP)
                      is_public: true
                      managed_by: nimble
                      name: aldi_clp
                      vertical: Ecommerce
                    - description: 'The Aldi Product Detail Page Agent extracts structured data from individual product pages
                      on Aldi. This agent is ideal for tracking competitor pricing, monitoring catalog changes, and powering
                      product intelligence use cases.

                      '
                      display_name: Aldi Product Details Page
                      domain: https://www.aldi.us/
                      entity_type: Product Detail Page (PDP)
                      is_public: true
                      managed_by: nimble
                      name: aldi_pdp
                      vertical: Ecommerce
                    - description: The Amazon Browse Products agent extracts structured product listings from Amazon’s category
                        pages. This agent is ideal for monitoring category-level assortment, analyzing competitive inventory,
                        and powering product discovery and pricing intelligence use cases
                      display_name: Amazon CLP
                      domain: www.amazon.com
                      entity_type: Category Landing Page (CLP)
                      is_public: true
                      managed_by: nimble
                      name: amazon_plp
                      vertical: Ecommerce
                    - description: The Amazon Product Detail Page Agent extracts structured data from individual product pages
                        on Amazon. This agent is ideal for tracking competitor pricing, monitoring catalog changes, and powering
                        product intelligence use cases.
                      display_name: Amazon Product Details Page
                      domain: www.amazon.com
                      entity_type: Product Detail Page (PDP)
                      is_public: true
                      managed_by: nimble
                      name: amazon_pdp
                      vertical: Ecommerce
          description: Successful Response
      security:
        - BearerAuth: []
      summary: List Agents
      tags:
        - Agents
  /v1/agents/async:
    post:
      description: Execute Search Agent Async Endpoint
      requestBody:
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AgentAsyncPayload'
              examples:
                - agent: google_search
                  params:
                    callback_url: https://my-callback-url.com/
                    query: What happened last night in the NBA?
                    storage_type: s3
                    storage_url: s3://mu-s3-bucket.com/
      responses:
        '200':
          content:
            application/json:
              example:
                status: success
                task:
                  created_at: '2026-01-24T12:36:24.685Z'
                  id: 8e8cfde8-345b-42b8-b3e2-0c61eb11e00f
                  input: {}
                  modified_at: '2026-01-24T12:36:24.685Z'
                  state: pending
              schema:
                $ref: '#/components/schemas/AsyncResponse'
          description: Async Task Created
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error400'
          description: Unprocessable Entity - Validation Error
        '402':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error402'
          description: Payment Required
        '404':
          content:
            application/json:
              example:
                msg: Agent not found
                status: failed
              schema:
                properties:
                  msg:
                    examples:
                      - Agent not found
                    type: string
                  status:
                    examples:
                      - failed
                    type: string
                required:
                  - status
                  - msg
                type: object
          description: Agent Not Found
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error429'
          description: Rate Limit Exceeded
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error500'
          description: Internal Server Error
      security:
        - BearerAuth: []
      summary: Agent Async
      tags:
        - Agents
  /v1/agents/batch:
    post:
      requestBody:
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AgentBatchBody'
              examples:
                - inputs:
                    - params:
                        keyword: iphone 15
                    - params:
                        keyword: iphone 16
                    - params:
                        keyword: iphone 17
                  shared_inputs:
                    agent: amazon_serp
      responses:
        '200':
          content:
            application/json:
              example:
                batch_id: 4b0a90bf-c951-42e4-95b3-a95a65ba69fc
                batch_size: 1
                tasks:
                  - account_name: string
                    api_type: extract
                    batch_id: 4b0a90bf-c951-42e4-95b3-a95a65ba69fc
                    created_at: '2024-01-15T10:30:00Z'
                    id: 123e4567-e89b-12d3-a456-426614174000
                    input: null
                    modified_at: '2024-01-15T10:35:00Z'
                    output_url: string
                    state: pending
                    status_code: 200
              schema:
                $ref: '#/components/schemas/BatchResponse'
          description: Agent Batch Created
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error400'
          description: Unprocessable Entity - Validation Error
        '402':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error402'
          description: Payment Required
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error429'
          description: Rate Limit Exceeded
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error500'
          description: Internal Server Error
      security:
        - BearerAuth: []
      summary: Agent Batch
      tags:
        - Agents
  /v1/agents/generations:
    post:
      requestBody:
        content:
          application/json:
            schema:
              anyOf:
                - $ref: '#/components/schemas/CreateAgentGenerationRequest'
                - $ref: '#/components/schemas/CreateAgentRefinementRequest'
              examples:
                - agent_name: books_toscrape_categories_nkjansdkj
                  input_schema:
                    properties:
                      category:
                        type: string
                    type: object
                  output_schema:
                    properties:
                      availability:
                        type: string
                      name:
                        type: string
                      price:
                        type: string
                      url:
                        type: string
                    type: object
                  prompt: I want an agent for books.toscrape.com category pages
                  url: books.toscrape.com
              title: Request
        required: true
      responses:
        '201':
          content:
            application/json:
              example:
                agent_name: books_toscrape_categories_nkjansdkj_2026_03_24_zco2isqi
                created_at: '2026-03-24T19:19:39.300002+00:00'
                id: 86441962-c8f5-4c24-b271-ee877d2dd865
                source_version_id: c51d09fc-c8f2-4b3a-a9bc-eaab88316217
                status: queued
              schema:
                $ref: '#/components/schemas/AgentGenerationResponse'
          description: Successful Response
        '402':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error402'
          description: Payment Required
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error400'
          description: Unprocessable Entity - Validation Error
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error429'
          description: Rate Limit Exceeded
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error500'
          description: Internal Server Error
      security:
        - BearerAuth: []
      summary: Generate Agent
      tags:
        - Agents
  /v1/agents/generations/{generation_id}:
    get:
      parameters:
        - in: path
          name: generation_id
          required: true
          schema:
            format: uuid
            title: Generation Id
            type: string
      responses:
        '200':
          content:
            application/json:
              example:
                agent_name: books_toscrape_categories_nkjansdkj_2026_03_24_zco2isqi
                completed_at: '2026-03-24T19:22:01.638660+00:00'
                created_at: '2026-03-24T19:19:39.300002+00:00'
                generated_version:
                  agent_name: books_toscrape_categories_nkjansdkj_2026_03_24_zco2isqi
                  artifacts: {}
                  id: fee30209-2439-459b-985a-ba7f8d8d2325
                  metadata:
                    data_source: books.toscrape.com
                    display_name: books_toscrape_categories_nkjansdkj
                    domain: books.toscrape.com
                    is_displayed: false
                    tags: []
                    vertical: Other
                  steps: []
                  version_number: 2
                generated_version_id: fee30209-2439-459b-985a-ba7f8d8d2325
